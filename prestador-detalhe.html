<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prestador - Portal Araripe</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .whatsapp-float { position:fixed; bottom:28px; right:28px; background:#25d366; color:white; border-radius:50px; padding:14px 20px; font-size:15px; font-weight:600; text-decoration:none; display:flex; align-items:center; gap:8px; box-shadow:0 4px 20px rgba(37,211,102,0.4); z-index:999; transition:transform 0.2s; }
  .detalhe-container { max-width:860px; margin:40px auto; padding:0 20px 60px; }
  .voltar { display:inline-flex; align-items:center; gap:6px; color:#2563EB; font-weight:600; text-decoration:none; margin-bottom:24px; font-size:15px; }
  .detalhe-titulo { font-size:30px; font-weight:900; color:#1a2f6b; margin:0 0 6px; }
  .detalhe-sub { color:#F97316; font-size:16px; font-weight:600; margin-bottom:16px; }
  .badge-plano { display:inline-block; padding:5px 14px; border-radius:20px; font-size:12px; font-weight:700; text-transform:uppercase; margin-bottom:16px; }
  .badge-plano.premium { background:#FEF3C7; color:#92400E; }
  .badge-plano.profissional { background:#EFF6FF; color:#1D4ED8; }
  .badge-plano.gratuito { background:#F0FDF4; color:#166534; }
  .foto-principal { width:100%; max-height:320px; object-fit:cover; border-radius:16px; margin-bottom:24px; }
  .fotos-extras { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:10px; margin-bottom:24px; }
  .fotos-extras img { width:100%; height:100px; object-fit:cover; border-radius:10px; cursor:pointer; }
  .detalhe-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:28px; }
  .detalhe-item { background:#f8fafc; border-radius:12px; padding:14px; }
  .detalhe-item label { font-size:11px; color:#888; font-weight:600; text-transform:uppercase; display:block; margin-bottom:4px; }
  .detalhe-item span { font-size:15px; font-weight:700; color:#1a2f6b; }
  .detalhe-secao { margin-bottom:24px; }
  .detalhe-secao h3 { font-size:17px; font-weight:700; color:#1a2f6b; margin-bottom:10px; border-bottom:2px solid #EFF6FF; padding-bottom:6px; }
  .detalhe-secao p { color:#444; line-height:1.8; font-size:15px; }
  .contato-box { background:#EFF6FF; border-radius:16px; padding:24px; margin-top:28px; }
  .contato-box h3 { font-size:17px; font-weight:700; color:#1a2f6b; margin-bottom:6px; }
  .contato-box p { color:#555; margin-bottom:16px; }
  .contato-btns { display:flex; flex-wrap:wrap; gap:10px; }
  .btn-wpp { display:inline-flex; align-items:center; gap:8px; background:#25d366; color:white; padding:14px 22px; border-radius:10px; text-decoration:none; font-weight:700; font-size:15px; }
  .btn-insta { display:inline-flex; align-items:center; gap:8px; background:#E1306C; color:white; padding:14px 22px; border-radius:10px; text-decoration:none; font-weight:700; font-size:15px; }
  .loading-state { text-align:center; padding:80px 20px; color:#666; font-size:16px; }
  @media(max-width:600px) { .detalhe-grid { grid-template-columns:1fr; } .detalhe-titulo { font-size:24px; } }
</style>
</head>
<body>

<div class="top-banner">
  Lancamento Oficial: <strong>3 meses GRATIS em todos os planos pagos!</strong> <a href="planos.html">Ver Planos</a>
</div>

<header class="header">
  <div class="container header-inner">
    <a href="index.html" class="logo">
      <div class="logo-icon">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <rect width="36" height="36" rx="8" fill="#2563EB"/>
          <path d="M18 8L6 18H10V28H16V22H20V28H26V18H30L18 8Z" fill="white"/>
          <circle cx="18" cy="11" r="2.5" fill="#F97316"/>
        </svg>
      </div>
      <div class="logo-text">
        <span class="logo-name">Portal Araripe</span>
        <span class="logo-sub">IMOVEIS &amp; SERVICOS</span>
      </div>
    </a>
    <nav class="nav">
      <a href="index.html" class="nav-link">Inicial</a>
      <a href="alugar.html" class="nav-link">Para Alugar</a>
      <a href="venda.html" class="nav-link">Para Venda</a>
      <a href="prestadores.html" class="nav-link active">Prestadores</a>
      <a href="planos.html" class="nav-link">Planos</a>
      <a href="contato.html" class="nav-link">Contato</a>
    </nav>
    <a href="cadastro-prestador.html" class="btn-primary">Cadastrar Servico</a>
    <button class="menu-toggle" onclick="toggleMenu()">&#9776;</button>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">Inicial</a>
    <a href="alugar.html">Para Alugar</a>
    <a href="venda.html">Para Venda</a>
    <a href="prestadores.html">Prestadores</a>
    <a href="planos.html">Planos</a>
    <a href="contato.html">Contato</a>
    <a href="cadastro-prestador.html" class="btn-primary">Cadastrar Servico</a>
  </div>
</header>

<div class="detalhe-container">
  <div id="conteudo" class="loading-state">Carregando prestador...</div>
</div>

<a href="https://wa.me/5588994893176" target="_blank" class="whatsapp-float">Falar no WhatsApp</a>

<script>
var SUPABASE_URL = 'https://vyuqjpdgrzdndpuxctsv.supabase.co';
var SUPABASE_KEY = 'sb_publishable_wpb5wIruSE-lsNO2ZqZkNQ_dDSBC6GJ';

function toggleMenu() {
  var menu = document.getElementById('mobileMenu');
  if (menu) menu.classList.toggle('open');
}

function getParam(nome) {
  var params = new URLSearchParams(window.location.search);
  return params.get(nome);
}

async function carregarPrestador() {
  var id = getParam('id');
  var conteudo = document.getElementById('conteudo');
  if (!id) {
    conteudo.innerHTML = '<p style="text-align:center;color:#ef4444;">Prestador nao encontrado.</p><a href="prestadores.html" style="color:#2563EB;">Voltar</a>';
    return;
  }
  try {
    var url = SUPABASE_URL + '/rest/v1/prestadores?id=eq.' + id;
    var response = await fetch(url, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    var dados = await response.json();
    var p = dados[0];
    if (!p) {
      conteudo.innerHTML = '<p style="text-align:center;color:#ef4444;">Prestador nao encontrado.</p><a href="prestadores.html" style="color:#2563EB;">Voltar</a>';
      return;
    }
    document.title = p.nome + ' - Portal Araripe';
    var plano = p.plano || 'gratuito';
    var fotoHtml = p.foto_url ? '<img src="' + p.foto_url + '" alt="Foto" class="foto-principal" onerror="this.style.display='none'">' : '';
    var instagramBtn = p.instagram ? '<a href="' + p.instagram + '" target="_blank" class="btn-insta">Ver Instagram</a>' : '';
    var telefone = p.telefone ? p.telefone.replace(/D/g, '') : '';
    var html = '<a href="prestadores.html" class="voltar">Voltar para Prestadores</a>'
      + fotoHtml
      + '<span class="badge-plano ' + plano + '">Plano ' + plano + '</span>'
      + '<h1 class="detalhe-titulo">' + p.nome + '</h1>'
      + '<p class="detalhe-sub">' + (p.categoria || '') + '</p>'
      + '<div class="detalhe-grid">'
      + '<div class="detalhe-item"><label>Cidade</label><span>' + (p.cidade || '') + '</span></div>'
      + '<div class="detalhe-item"><label>Area de Atendimento</label><span>' + (p.area_atendimento || p.cidade || '') + '</span></div>'
      + (p.experiencia ? '<div class="detalhe-item"><label>Experiencia</label><span>' + p.experiencia + '</span></div>' : '')
      + '<div class="detalhe-item"><label>Forma de Cobranca</label><span>' + (p.forma_cobranca || 'Consultar') + '</span></div>'
      + (p.valor_minimo ? '<div class="detalhe-item"><label>Valor Minimo</label><span>R$ ' + parseFloat(p.valor_minimo).toFixed(2).replace('.', ',') + '</span></div>' : '')
      + '<div class="detalhe-item"><label>Orcamento Gratis</label><span>' + (p.orcamento_gratis === 'sim' ? 'Sim' : 'Nao') + '</span></div>'
      + '</div>';
    if (p.descricao) html += '<div class="detalhe-secao"><h3>Sobre o Prestador</h3><p>' + p.descricao + '</p></div>';
    if (p.especialidades) html += '<div class="detalhe-secao"><h3>Especialidades e Servicos</h3><p>' + p.especialidades + '</p></div>';
    html += '<div class="contato-box"><h3>Quer contratar este servico?</h3>'
      + '<p>Entre em contato direto pelo WhatsApp' + (p.instagram ? ' ou veja o Instagram:' : ':') + '</p>'
      + '<div class="contato-btns"><a href="https://wa.me/55' + telefone + '" target="_blank" class="btn-wpp">Chamar no WhatsApp</a>'
      + instagramBtn + '</div></div>';
    conteudo.innerHTML = html;
  } catch (err) {
    conteudo.innerHTML = '<p style="text-align:center;color:#ef4444;">Erro ao carregar. Tente novamente.</p><br><a href="prestadores.html" style="color:#2563EB;">Voltar</a>';
  }
}

carregarPrestador();
</script>

</body>
</html>
