<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imovel - Portal Araripe</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .whatsapp-float { position:fixed; bottom:28px; right:28px; background:#25d366; color:white; border-radius:50px; padding:14px 20px; font-size:15px; font-weight:600; text-decoration:none; display:flex; align-items:center; gap:8px; box-shadow:0 4px 20px rgba(37,211,102,0.4); z-index:999; }
  .detalhe-container { max-width:860px; margin:40px auto; padding:0 20px 60px; }
  .voltar { display:inline-flex; align-items:center; gap:6px; color:#2563EB; font-weight:600; text-decoration:none; margin-bottom:24px; font-size:15px; }
  .detalhe-titulo { font-size:30px; font-weight:900; color:#1a2f6b; margin:0 0 6px; }
  .detalhe-sub { color:#666; font-size:15px; margin-bottom:16px; }
  .detalhe-preco { font-size:26px; font-weight:800; color:#2563EB; margin-bottom:20px; }
  .detalhe-badges { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:20px; }
  .badge { background:#EFF6FF; color:#1D4ED8; padding:5px 14px; border-radius:20px; font-size:13px; font-weight:600; }
  .badge.laranja { background:#FFF7ED; color:#C2410C; }
  .detalhe-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:28px; }
  .detalhe-item { background:#f8fafc; border-radius:12px; padding:14px; }
  .detalhe-item label { font-size:11px; color:#888; font-weight:600; text-transform:uppercase; display:block; margin-bottom:4px; }
  .detalhe-item span { font-size:15px; font-weight:700; color:#1a2f6b; }
  .detalhe-secao { margin-bottom:24px; }
  .detalhe-secao h3 { font-size:17px; font-weight:700; color:#1a2f6b; margin-bottom:10px; border-bottom:2px solid #EFF6FF; padding-bottom:6px; }
  .detalhe-secao p { color:#444; line-height:1.8; font-size:15px; }
  .prox-lista { display:flex; flex-wrap:wrap; gap:8px; }
  .prox-tag { background:#f0fdf4; color:#166534; padding:5px 12px; border-radius:8px; font-size:13px; }
  .contato-box { background:#EFF6FF; border-radius:16px; padding:24px; margin-top:28px; }
  .contato-box h3 { font-size:17px; font-weight:700; color:#1a2f6b; margin-bottom:6px; }
  .contato-box p { color:#555; margin-bottom:16px; }
  .btn-wpp { display:inline-flex; align-items:center; gap:8px; background:#25d366; color:white; padding:14px 22px; border-radius:10px; text-decoration:none; font-weight:700; font-size:15px; }
  .loading-state { text-align:center; padding:80px 20px; color:#666; font-size:16px; }
  @media(max-width:600px) { .detalhe-grid { grid-template-columns:1fr; } .detalhe-titulo { font-size:24px; } }
</style>
</head>
<body>

<div class="top-banner">
  Lancamento Oficial: <strong>3 meses GRATIS em todos os planos pagos!</strong> <a href="planos.html">Ver Planos</a>
</div>

<header class="header">
  <div class="container header-inner">
    <a href="index.html" class="logo">
      <div class="logo-icon"><svg width="36" height="36" viewBox="0 0 36 36" fill="none"><rect width="36" height="36" rx="8" fill="#2563EB"/><path d="M18 8L6 18H10V28H16V22H20V28H26V18H30L18 8Z" fill="white"/><circle cx="18" cy="11" r="2.5" fill="#F97316"/></svg></div>
      <div class="logo-text"><span class="logo-name">Portal Araripe</span><span class="logo-sub">IMOVEIS &amp; SERVICOS</span></div>
    </a>
    <nav class="nav">
      <a href="index.html" class="nav-link">Inicial</a>
      <a href="alugar.html" class="nav-link">Para Alugar</a>
      <a href="venda.html" class="nav-link">Para Venda</a>
      <a href="prestadores.html" class="nav-link">Prestadores</a>
      <a href="planos.html" class="nav-link">Planos</a>
      <a href="contato.html" class="nav-link">Contato</a>
    </nav>
    <a href="anunciar.html" class="btn-primary">Anunciar Agora</a>
    <button class="menu-toggle" onclick="toggleMenu()">&#9776;</button>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">Inicial</a>
    <a href="alugar.html">Para Alugar</a>
    <a href="venda.html">Para Venda</a>
    <a href="prestadores.html">Prestadores</a>
    <a href="planos.html">Planos</a>
    <a href="contato.html">Contato</a>
    <a href="anunciar.html" class="btn-primary">Anunciar Agora</a>
  </div>
</header>

<div class="detalhe-container">
  <div id="conteudo" class="loading-state">Carregando imovel...</div>
</div>

<a href="https://wa.me/5588994893176" target="_blank" class="whatsapp-float">Falar no WhatsApp</a>

<script>
var SUPABASE_URL = 'https://vyuqjpdgrzdndpuxctsv.supabase.co';
var SUPABASE_KEY = 'sb_publishable_wpb5wIruSE-lsNO2ZqZkNQ_dDSBC6GJ';

function toggleMenu() {
  var menu = document.getElementById('mobileMenu');
  if (menu) menu.classList.toggle('open');
}

function getParam(nome) {
  var params = new URLSearchParams(window.location.search);
  return params.get(nome);
}

async function carregarImovel() {
  var id = getParam('id');
  var origem = getParam('origem') || 'alugar.html';
  var conteudo = document.getElementById('conteudo');

  if (!id) {
    conteudo.innerHTML = '<p style="text-align:center;color:#ef4444;">Imovel nao encontrado.</p><br><a href="alugar.html" style="color:#2563EB;">Voltar</a>';
    return;
  }

  try {
    var response = await fetch(SUPABASE_URL + '/rest/v1/imoveis?id=eq.' + id, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    var dados = await response.json();
    var p = dados[0];

    if (!p) {
      conteudo.innerHTML = '<p style="text-align:center;color:#ef4444;">Imovel nao encontrado.</p><br><a href="' + origem + '" style="color:#2563EB;">Voltar</a>';
      return;
    }

    document.title = p.titulo + ' - Portal Araripe';

    var valor = parseFloat(p.valor).toLocaleString('pt-BR', {minimumFractionDigits:2});
    var sufixo = p.tipo_anuncio === 'aluguel' ? '/mes' : '';
    var telefone = p.telefone ? p.telefone.replace(/\D/g, '') : '';

    var proximidades = '';
    if (p.proximidades) {
      var prox = p.proximidades.split(',');
      proximidades = prox.map(function(x) { return '<span class="prox-tag">' + x.trim() + '</span>'; }).join('');
    }

    var html = '<a href="' + origem + '" class="voltar">Voltar</a>'
      + '<div class="detalhe-badges">'
      + '<span class="badge">' + (p.tipo_imovel || '') + '</span>'
      + '<span class="badge laranja">' + (p.tipo_anuncio === 'aluguel' ? 'Para Alugar' : 'Para Venda') + '</span>'
      + (p.zona ? '<span class="badge">' + p.zona + '</span>' : '')
      + '</div>'
      + '<h1 class="detalhe-titulo">' + p.titulo + '</h1>'
      + '<p class="detalhe-sub">' + (p.bairro || '') + ', ' + (p.cidade || '') + (p.endereco ? ' - ' + p.endereco : '') + '</p>'
      + '<div class="detalhe-preco">R$ ' + valor + sufixo + '</div>'
      + '<div class="detalhe-grid">'
      + (p.metragem ? '<div class="detalhe-item"><label>Area</label><span>' + p.metragem + ' m2</span></div>' : '')
      + (p.quartos ? '<div class="detalhe-item"><label>Quartos</label><span>' + p.quartos + '</span></div>' : '')
      + (p.banheiros ? '<div class="detalhe-item"><label>Banheiros</label><span>' + p.banheiros + '</span></div>' : '')
      + (p.vagas ? '<div class="detalhe-item"><label>Vagas</label><span>' + p.vagas + '</span></div>' : '')
      + (p.negociacao === 'sim' ? '<div class="detalhe-item"><label>Negociacao</label><span>Aceita</span></div>' : '')
      + '</div>';

    if (p.descricao) {
      html += '<div class="detalhe-secao"><h3>Descricao</h3><p>' + p.descricao + '</p></div>';
    }

    if (proximidades) {
      html += '<div class="detalhe-secao"><h3>Proximidades</h3><div class="prox-lista">' + proximidades + '</div></div>';
    }

    html += '<div class="contato-box">'
      + '<h3>Interessado neste imovel?</h3>'
      + '<p>Entre em contato direto com o anunciante pelo WhatsApp:</p>'
      + '<a href="https://wa.me/55' + telefone + '" target="_blank" class="btn-wpp">Falar com ' + (p.nome || 'Anunciante') + '</a>'
      + '</div>';

    conteudo.innerHTML = html;

  } catch (err) {
    conteudo.innerHTML = '<p style="text-align:center;color:#ef4444;">Erro ao carregar. Tente novamente.</p><br><a href="' + (getParam('origem') || 'alugar.html') + '" style="color:#2563EB;">Voltar</a>';
  }
}

carregarImovel();
</script>
</body>
</html>
