<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detalhes do Imóvel — Portal Araripe</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .whatsapp-float { position:fixed; bottom:28px; right:28px; background:#25d366; color:white; border-radius:50px; padding:14px 20px; font-size:15px; font-weight:600; text-decoration:none; display:flex; align-items:center; gap:8px; box-shadow:0 4px 20px rgba(37,211,102,0.4); z-index:999; transition:transform 0.2s; }
  .whatsapp-float:hover { transform:scale(1.05); }

.detalhe-container { max-width: 860px; margin: 40px auto; padding: 0 20px 60px; }

.voltar { display:inline-flex; align-items:center; gap:6px; color:#2563EB; font-weight:600; text-decoration:none; margin-bottom:24px; font-size:15px; }
.voltar:hover { text-decoration:underline; }

.detalhe-titulo { font-size:32px; font-weight:900; color:#1a2f6b; margin:0 0 8px; }
.detalhe-sub { color:#666; font-size:16px; margin-bottom:24px; }

.detalhe-preco { font-size:28px; font-weight:800; color:#2563EB; margin-bottom:24px; }

.detalhe-badges { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:28px; }
.badge { background:#EFF6FF; color:#1D4ED8; padding:6px 14px; border-radius:20px; font-size:13px; font-weight:600; }
.badge.laranja { background:#FFF7ED; color:#C2410C; }

.detalhe-grid { display:grid; grid-template-columns: 1fr 1fr; gap:16px; margin-bottom:32px; }
.detalhe-item { background:#f8fafc; border-radius:12px; padding:16px; }
.detalhe-item label { font-size:12px; color:#888; font-weight:600; text-transform:uppercase; display:block; margin-bottom:4px; }
.detalhe-item span { font-size:16px; font-weight:700; color:#1a2f6b; }

.detalhe-secao { margin-bottom:28px; }
.detalhe-secao h3 { font-size:18px; font-weight:700; color:#1a2f6b; margin-bottom:12px; border-bottom:2px solid #EFF6FF; padding-bottom:8px; }
.detalhe-secao p { color:#444; line-height:1.8; font-size:15px; }

.proximidades-lista { display:flex; flex-wrap:wrap; gap:8px; }
.proximidade-tag { background:#f0fdf4; color:#166534; padding:6px 12px; border-radius:8px; font-size:13px; font-weight:500; }

.btn-wpp { display:inline-flex; align-items:center; gap:10px; background:#25d366; color:white; padding:16px 28px; border-radius:12px; text-decoration:none; font-weight:700; font-size:17px; margin-top:8px; transition:background 0.2s; }
.btn-wpp:hover { background:#1da851; }

.contato-box { background:#EFF6FF; border-radius:16px; padding:28px; margin-top:32px; }
.contato-box h3 { font-size:18px; font-weight:700; color:#1a2f6b; margin-bottom:6px; }
.contato-box p { color:#555; margin-bottom:16px; }

.loading-state { text-align:center; padding:80px 20px; color:#666; font-size:16px; }

@media(max-width:600px) {
.detalhe-grid { grid-template-columns:1fr; }
.detalhe-titulo { font-size:24px; }
}
</style>

</head>
<body>

<div class="top-banner">
  ✦ Lançamento Oficial: <strong>3 meses GRÁTIS em todos os planos pagos!</strong> <a href="planos.html">Ver Planos →</a>
</div>

<header class="header">
  <div class="container header-inner">
    <a href="index.html" class="logo">
      <div class="logo-icon">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <rect width="36" height="36" rx="8" fill="#2563EB"/>
          <path d="M18 8L6 18H10V28H16V22H20V28H26V18H30L18 8Z" fill="white"/>
          <circle cx="18" cy="11" r="2.5" fill="#F97316"/>
        </svg>
      </div>
      <div class="logo-text">
        <span class="logo-name">Portal Araripe</span>
        <span class="logo-sub">IMÓVEIS & SERVIÇOS</span>
      </div>
    </a>
    <nav class="nav">
      <a href="index.html" class="nav-link">Inicial</a>
      <a href="alugar.html" class="nav-link">Para Alugar</a>
      <a href="venda.html" class="nav-link">Para Venda</a>
      <a href="prestadores.html" class="nav-link">Prestadores</a>
      <a href="planos.html" class="nav-link">Planos</a>
      <a href="contato.html" class="nav-link">Contato</a>
    </nav>
    <a href="anunciar.html" class="btn-primary">Anunciar Agora</a>
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">Inicial</a>
    <a href="alugar.html">Para Alugar</a>
    <a href="venda.html">Para Venda</a>
    <a href="prestadores.html">Prestadores</a>
    <a href="planos.html">Planos</a>
    <a href="contato.html">Contato</a>
    <a href="anunciar.html" class="btn-primary">Anunciar Agora</a>
  </div>
</header>

<div class="detalhe-container">
  <div id="conteudo" class="loading-state">⏳ Carregando imóvel...</div>
</div>

<a href="https://wa.me/5588994893176" target="_blank" class="whatsapp-float">💬 Falar no WhatsApp</a>

<script src="script.js"></script>

<script>
const SUPABASE_URL = 'https://vyuqjpdgrzdndpuxctsv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_wpb5wIruSE-lsNO2ZqZkNQ_dDSBC6GJ';

async function carregarImovel() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const voltar = params.get('origem') || 'alugar.html';

  const conteudo = document.getElementById('conteudo');

  if (!id) {
    conteudo.innerHTML = '<p style="text-align:center;color:#ef4444;">Imóvel não encontrado.</p>';
    return;
  }

  try {
    const response = await fetch(`${SUPABASE_URL}/rest/v1/imoveis?id=eq.${id}&status=eq.ativo`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    const dados = await response.json();
    const p = dados[0];

    if (!p) {
      conteudo.innerHTML = '<p style="text-align:center;color:#ef4444;">Imóvel não encontrado.</p>';
      return;
    }

    document.title = `${p.titulo} — Portal Araripe`;

    const proximidades = p.proximidades
      ? p.proximidades.split(',').map(x => `<span class="proximidade-tag">📍 ${x.trim()}</span>`).join('')
      : '';

    conteudo.innerHTML = `
      <a href="${voltar}" class="voltar">← Voltar</a>
      <div class="detalhe-badges">
        <span class="badge">${p.tipo_imovel}</span>
        <span class="badge laranja">${p.tipo_anuncio === 'aluguel' ? '🔑 Para Alugar' : '🏡 Para Venda'}</span>
        <span class="badge">${p.zona === 'urbana' ? '🏙️ Zona Urbana' : '🌿 Zona Rural'}</span>
      </div>
      <h1 class="detalhe-titulo">${p.titulo}</h1>
      <p class="detalhe-sub">📍 ${p.bairro}, ${p.cidade} — ${p.endereco}</p>
      <div class="detalhe-preco">R$ ${parseFloat(p.valor).toLocaleString('pt-BR', {minimumFractionDigits:2})}${p.tipo_anuncio === 'aluguel' ? '/mês' : ''}</div>

      <div class="detalhe-grid">
        ${p.metragem ? `<div class="detalhe-item"><label>Área</label><span>${p.metragem} m²</span></div>` : ''}
        ${p.quartos ? `<div class="detalhe-item"><label>Quartos</label><span>${p.quartos}</span></div>` : ''}
        ${p.banheiros ? `<div class="detalhe-item"><label>Banheiros</label><span>${p.banheiros}</span></div>` : ''}
        ${p.vagas ? `<div class="detalhe-item"><label>Vagas</label><span>${p.vagas}</span></div>` : ''}
        ${p.negociacao === 'sim' ? `<div class="detalhe-item"><label>Negociação</label><span>✅ Aceita</span></div>` : ''}
      </div>

      ${p.descricao ? `
      <div class="detalhe-secao">
        <h3>📋 Descrição</h3>
        <p>${p.descricao}</p>
      </div>` : ''}

      ${proximidades ? `
      <div class="detalhe-secao">
        <h3>🗺️ Proximidades</h3>
        <div class="proximidades-lista">${proximidades}</div>
      </div>` : ''}

      <div class="contato-box">
        <h3>Interessado neste imóvel?</h3>
        <p>Entre em contato direto com o anunciante pelo WhatsApp:</p>
        <a href="https://wa.me/55${p.telefone.replace(/\D/g,'')}" target="_blank" class="btn-wpp">
          💬 Falar com ${p.nome}
        </a>
      </div>
    `;
  } catch (err) {
    conteudo.innerHTML = '<p style="text-align:center;color:#ef4444;">Erro ao carregar. Tente novamente.</p>';
  }
}

carregarImovel();
</script>

</body>
</html>
